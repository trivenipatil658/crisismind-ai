services:
  - type: web
    name: crisismind-ai-backend
    env: python
    root: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        value: http://127.0.0.1:5173,http://localhost:5173
      - key: DATABASE_FILE
        value: crisismind.db
