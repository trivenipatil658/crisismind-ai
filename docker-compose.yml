services:
  backend:
    build:
      context: ./backend
    container_name: crisismind-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/crisismind.db

      # Ollama running on your Windows laptop
      - USE_LLM=true
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=llama3.2:3b

    volumes:
      - backend_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: crisismind-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data: